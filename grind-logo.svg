<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.2"/>
      <stop offset="35%" stop-color="#00C2FF"/>
      <stop offset="65%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="pl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a5570"/><stop offset="50%" stop-color="#00C2FF"/><stop offset="100%" stop-color="#0a5570"/>
    </linearGradient>
    <linearGradient id="pr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a3070"/><stop offset="50%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#0a3070"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0d1a2e"/><stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
  </defs>

  <rect width="600" height="300" fill="url(#bg)" rx="18"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#00C2FF" stroke-width="0.5">
    <line x1="0" y1="75" x2="600" y2="75"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="225" x2="600" y2="225"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
  </g>

  <!-- WORDMARK — "GrindFlow" centered, Grind white + Flow cyan -->
  <!-- Glow halo behind full wordmark -->
  <text x="300" y="122" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif" font-size="68" font-weight="900" letter-spacing="-1"
    fill="#00C2FF" opacity="0.18" filter="url(#glow-cyan)">GrindFlow</text>

  <!-- Main wordmark — single text, tspan for colour split -->
  <text x="300" y="122" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif" font-size="68" font-weight="900" letter-spacing="-1"
    filter="url(#text-glow)">
    <tspan fill="#E5E7EB">Grind</tspan><tspan fill="#00C2FF" filter="url(#glow-soft)">Flow</tspan>
  </text>

  <!-- Thin rule below text -->
  <line x1="80" y1="138" x2="520" y2="138" stroke="url(#bar-grad)" stroke-width="1" opacity="0.45"/>

  <!-- DUMBBELL — bar runs edge to edge, lower half -->
  <!-- Bar glow halo -->
  <rect x="55" y="196" width="490" height="10" rx="5" fill="url(#bar-grad)" filter="url(#glow-cyan)" opacity="0.55"/>
  <!-- Bar solid -->
  <rect x="55" y="198" width="490" height="6" rx="3" fill="url(#bar-grad)"/>

  <!-- Left collar -->
  <rect x="123" y="184" width="20" height="34" rx="4" fill="#00C2FF" filter="url(#glow-soft)" opacity="0.95"/>
  <!-- Right collar -->
  <rect x="457" y="184" width="20" height="34" rx="4" fill="#3B82F6" filter="url(#glow-soft)" opacity="0.95"/>

  <!-- Left outer plate -->
  <rect x="53" y="170" width="28" height="60" rx="7" fill="none" stroke="#00C2FF" stroke-width="2.5" opacity="0.3" filter="url(#glow-soft)"/>
  <rect x="55" y="172" width="24" height="56" rx="6" fill="url(#pl)" stroke="#00C2FF" stroke-width="1.5" filter="url(#glow-cyan)" opacity="0.95"/>
  <!-- Left inner plate -->
  <rect x="79" y="165" width="18" height="70" rx="5" fill="url(#pl)" stroke="#00C2FF" stroke-width="1" opacity="0.9"/>

  <!-- Right inner plate -->
  <rect x="503" y="165" width="18" height="70" rx="5" fill="url(#pr)" stroke="#3B82F6" stroke-width="1" opacity="0.9"/>
  <!-- Right outer plate -->
  <rect x="519" y="170" width="28" height="60" rx="7" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.3" filter="url(#glow-soft)"/>
  <rect x="521" y="172" width="24" height="56" rx="6" fill="url(#pr)" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow-cyan)" opacity="0.95"/>

  <!-- Tagline -->
  <text x="300" y="268" text-anchor="middle"
    font-family="Courier New, monospace" font-size="11" letter-spacing="5"
    fill="#00C2FF" opacity="0.5">PERSONAL WORKOUT TRACKER</text>
</svg>